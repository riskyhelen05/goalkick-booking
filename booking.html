<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Lapangan | GoalKick</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-600 via-purple-600 to-red-500 text-white min-h-screen">

<!-- NAVBAR -->

<nav class="fixed w-full backdrop-blur-lg bg-white/30 border-b border-white/20 z-50">

<div class="max-w-7xl mx-auto px-6">

<div class="flex justify-between items-center h-16">

<h1 class="text-xl font-bold text-blue-800">
GoalKick
</h1>

<div class="space-x-6 hidden md:flex font-medium">

<a href="index.html" class="hover:text-blue-700">Home</a>
<a href="gallery.html" class="hover:text-blue-700">Gallery</a>
<a href="booking.html" class="text-blue-700 font-semibold">Booking</a>
<a href="tentang.html" class="hover:text-blue-700">Tentang</a>

</div>

</div>
</div>
</nav>


<!-- CONTAINER -->

<div class="max-w-6xl mx-auto px-5 pt-28 pb-10">

<h1 class="text-3xl font-bold text-center mb-10">
⚽ Sistem Booking Lapangan Futsal
</h1>


<!-- STATISTIK -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">

<div class="bg-white/20 backdrop-blur-xl p-6 rounded-xl border border-white/30 text-center">
<h3 class="text-white/80">Total Booking Hari Ini</h3>
<p id="totalBooking" class="text-3xl font-bold text-yellow-300">0</p>
</div>

<div class="bg-white/20 backdrop-blur-xl p-6 rounded-xl border border-white/30 text-center">
<h3 class="text-white/80">Pendapatan Hari Ini</h3>
<p id="totalPendapatan" class="text-3xl font-bold text-yellow-300">Rp0</p>
</div>

</div>


<!-- FORM BOOKING -->

<div class="bg-white/20 backdrop-blur-xl p-8 rounded-xl shadow-xl border border-white/30 mb-10">

<form id="formSewa" novalidate class="grid grid-cols-1 md:grid-cols-2 gap-5">

<!-- Nama -->

<div class="md:col-span-2">
<label class="text-sm">Nama Penyewa</label>

<input type="text" id="nama"
class="w-full p-3 rounded-lg bg-white/20 border border-white/40 focus:ring-2 focus:ring-blue-400 outline-none">

<small id="errNama" class="text-red-300"></small>
</div>

<!-- WA -->

<div>
<label class="text-sm">Nomor WhatsApp</label>

<input type="tel" id="wa"
class="w-full p-3 rounded-lg bg-white/20 border border-white/40 focus:ring-2 focus:ring-blue-400 outline-none">

<small id="errWa" class="text-red-300"></small>
</div>

<!-- Lapangan -->

<div>
<label class="text-sm">
Pilih Lapangan
</label>

<select id="lapangan"
class="w-full p-3 rounded-lg bg-white/20 border border-white/40">

<option class="text-black" value="">Pilih Lapangan</option>
<option class="text-black" value="Lapangan A">Lapangan A</option>
<option class="text-black" value="Lapangan B">Lapangan B</option>
<option class="text-black" value="Lapangan C">Lapangan C</option>

</select>

<small id="errLapangan" class="text-red-300"></small>
</div>

<!-- Tanggal -->

<div>
<label class="text-sm">Tanggal Booking</label>

<input type="date" id="tanggal"
class="w-full p-3 rounded-lg bg-white/20 border border-white/40">

<small id="errTanggal" class="text-red-300"></small>
</div>

<!-- Jam Mulai -->

<div>
<label class="text-sm">Jam Mulai</label>

<input type="time" id="jamMulai"
class="w-full p-3 rounded-lg bg-white/20 border border-white/40">
</div>

<!-- Jam Selesai -->

<div>
<label class="text-sm">Jam Selesai</label>

<input type="time" id="jamSelesai"
class="w-full p-3 rounded-lg bg-white/20 border border-white/40">

<small id="errJadwal" class="text-red-300"></small>
</div>

<!-- HARGA & DURASI -->

<div class="md:col-span-2 bg-white/10 p-4 rounded-lg mt-2">

<div class="flex justify-between text-yellow-300 text-lg font-semibold">
<span>⏱ Durasi</span>
<span id="durasi">0 Jam</span>
</div>

<div class="flex justify-between text-yellow-300 text-lg font-semibold">
<span>💰 Total Harga</span>
<span id="totalHarga">Rp0</span>
</div>

</div>

<!-- BUTTON -->

<div class="md:col-span-2 flex flex-col sm:flex-row gap-4">

<button type="submit"
class="bg-gradient-to-r from-blue-600 to-red-500 px-6 py-3 rounded-lg font-semibold hover:scale-105 transition w-full">

Simpan Booking

</button>

<button type="button"
onclick="resetData()"
class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-lg font-semibold w-full">

Reset Data

</button>

</div>

</form>

</div>


<!-- SEARCH -->

<input type="text"
id="search"
placeholder="🔍 Cari penyewa..."
class="w-full p-3 mb-6 rounded-lg bg-white/20 border border-white/40 placeholder-white/70">


<!-- TABEL -->

<div class="overflow-x-auto mb-12">

<table class="w-full text-sm md:text-base text-center bg-white/20 backdrop-blur-xl rounded-xl border border-white/30">

<thead class="bg-gradient-to-r from-blue-600 to-red-500 text-white">

<tr>

<th class="p-3">ID</th>
<th>Nama</th>
<th>Kontak</th>
<th>Lapangan</th>
<th>Tanggal</th>
<th>Jam</th>
<th>Durasi</th>
<th>Status</th>
<th>Total</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="tabelData"></tbody>

</table>

</div>


<!-- JADWAL HARI INI -->

<h2 class="text-2xl font-bold mb-6 text-center">
Jadwal Hari Ini
</h2>

<div id="jadwalHarian"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5"></div>


<!-- SLOT -->

<h2 class="text-2xl font-bold mt-10 mb-6 text-center">
Preview Slot Lapangan
</h2>

<div id="slotLapangan"
class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>


<!-- TOAST -->

<div id="toast"
class="fixed bottom-6 right-6 bg-blue-600 text-white px-5 py-3 rounded-lg shadow opacity-0 transition-opacity duration-300">
</div>


<script src="script.js"></script>

</body>
</html>
